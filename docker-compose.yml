services:
  redis:
    image: redis:7.4-alpine
    container_name: mainf-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  request-router-service:
    build:
      context: .
      dockerfile: services/request-router-service/Dockerfile
    container_name: mainf-request-router
    environment:
      SERVER_PORT: 8081
    ports:
      - "8081:8081"

  execution-window-service:
    build:
      context: .
      dockerfile: services/execution-window-service/Dockerfile
    container_name: mainf-window
    environment:
      SERVER_PORT: 8082
    ports:
      - "8082:8082"

  faas-invoker-service:
    build:
      context: .
      dockerfile: services/faas-invoker-service/Dockerfile
    container_name: mainf-faas
    environment:
      PORT: 8090
      PROVIDER: aws-lambda-simulator
      SIMULATED_DELAY_MS: 250
    ports:
      - "8090:8090"

  result-cache-service:
    build:
      context: .
      dockerfile: services/result-cache-service/Dockerfile
    container_name: mainf-cache
    environment:
      PORT: 8091
      REDIS_URL: redis://redis:6379
      DEFAULT_TTL_SECONDS: 60
    depends_on:
      - redis
    ports:
      - "8091:8091"

  orchestrator-service:
    build:
      context: .
      dockerfile: services/orchestrator-service/Dockerfile
    container_name: mainf-orchestrator
    environment:
      SERVER_PORT: 8080
      SERVICES_REQUEST_ROUTER_BASE_URL: http://request-router-service:8081
      SERVICES_EXECUTION_WINDOW_BASE_URL: http://execution-window-service:8082
      SERVICES_CACHE_BASE_URL: http://result-cache-service:8091
      SERVICES_FAAS_INVOKER_BASE_URL: http://faas-invoker-service:8090
      ORCHESTRATOR_EXECUTION_WINDOW_MS: 200
      ORCHESTRATOR_FOLLOWER_WAIT_TIMEOUT_MS: 5000
    depends_on:
      - request-router-service
      - execution-window-service
      - faas-invoker-service
      - result-cache-service
    ports:
      - "8080:8080"

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: mainf-gateway
    environment:
      SERVER_PORT: 8088
      GATEWAY_ORCHESTRATOR_BASE_URL: http://orchestrator-service:8080
      GATEWAY_CACHE_BASE_URL: http://result-cache-service:8091
      GATEWAY_HEALTH_TARGETS_ORCHESTRATOR: http://orchestrator-service:8080/actuator-like/health
      GATEWAY_HEALTH_TARGETS_REQUEST_ROUTER: http://request-router-service:8081/actuator-like/health
      GATEWAY_HEALTH_TARGETS_EXECUTION_WINDOW: http://execution-window-service:8082/actuator-like/health
      GATEWAY_HEALTH_TARGETS_FAAS_INVOKER: http://faas-invoker-service:8090/health
      GATEWAY_HEALTH_TARGETS_RESULT_CACHE: http://result-cache-service:8091/health
    depends_on:
      - orchestrator-service
    ports:
      - "8088:8088"

  frontend:
    build:
      context: .
      dockerfile: fdn-ui/Dockerfile
    container_name: mainf-frontend
    depends_on:
      - api-gateway
    ports:
      - "4173:80"

volumes:
  redis-data:
